<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>XinYi Xie</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #fafafa;
      color: #222;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1.6;
    }

    main {
      max-width: 480px;
      padding: 48px 32px;
    }

    h1 {
      font-size: 1.75rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      margin-bottom: 4px;
    }

    .affiliation {
      font-size: 0.95rem;
      color: #555;
      margin-bottom: 8px;
    }

    .email {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 32px;
    }

    .email a {
      color: #555;
      text-decoration: none;
      border-bottom: 1px solid #ccc;
      transition: color 0.2s, border-color 0.2s;
    }

    .email a:hover {
      color: #000;
      border-color: #888;
    }

    .section-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #999;
      margin-bottom: 12px;
    }

    .interests {
      list-style: none;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .interests li {
      font-size: 0.88rem;
      background: #f0f0f0;
      color: #333;
      padding: 4px 14px;
      border-radius: 20px;
      white-space: nowrap;
    }

    footer {
      margin-top: 48px;
      font-size: 0.75rem;
      color: #bbb;
    }

    @media (prefers-color-scheme: dark) {
      body { background: #1a1a1a; color: #e0e0e0; }
      .affiliation { color: #aaa; }
      .email { color: #999; }
      .email a { color: #aaa; border-color: #555; }
      .email a:hover { color: #fff; border-color: #999; }
      .section-title { color: #777; }
      .interests li { background: #2a2a2a; color: #ccc; }
      footer { color: #555; }
    }
  </style>
</head>
<body>
  <main>
    <h1>XinYi Xie</h1>
    <p class="affiliation">Fudan University</p>
    <p class="email"><a href="mailto:24210240346@m.fudan.edu.cn">24210240346@m.fudan.edu.cn</a></p>

    <h2 class="section-title">Research Interests</h2>
    <ul class="interests">
      <li>3D Vision</li>
      <li>Embodied Intelligence</li>
      <li>Multimodal Learning</li>
    </ul>

    <footer>Last updated May 2026</footer>
  </main>
</body>
</html>
